development:
  adapter: redis
  url: redis://localhost:6379/cable

test:
  adapter: test

production:
  adapter: redis  
  # url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  #  ↓ herokuのアドオンでredisを作成するとREDIS_URLという環境変数に自動的にURLを設定してくれる。
  url: <%= ENV['REDIS_URL'] %>
  channel_prefix: dogrun_connect_production
  ssl_params:
    verify_mode: 0

